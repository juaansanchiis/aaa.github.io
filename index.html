<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sobre de felicitación</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* Reset y fondo */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #4facfe 75%, #00f2fe 100%);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      font-family: 'Poppins', sans-serif;
      padding: 16px;
      overflow-x: hidden;
      perspective: 1200px;
    }

    @keyframes gradientShift {
      0% {
        background-position: 0% 50%;
      }
      50% {
        background-position: 100% 50%;
      }
      100% {
        background-position: 0% 50%;
      }
    }

    /* Partículas decorativas de fondo */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(circle at 20% 50%, rgba(255, 255, 255, 0.1) 1px, transparent 1px),
        radial-gradient(circle at 80% 80%, rgba(255, 255, 255, 0.08) 2px, transparent 2px),
        radial-gradient(circle at 40% 20%, rgba(255, 255, 255, 0.07) 1px, transparent 1px);
      background-size: 200% 200%, 300% 300%, 250% 250%;
      background-position: 0% 0%, 50% 50%, 100% 0%;
      animation: particleMove 30s linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes particleMove {
      0% {
        background-position: 0% 0%, 50% 50%, 100% 0%;
      }
      100% {
        background-position: 100% 100%, -50% -50%, -100% 100%;
      }
    }

    /* Contenedor principal */
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      width: 100%;
      position: relative;
      z-index: 1;
      perspective: 1200px;
    }

    /* === SOBRE === */
    .envelope {
      position: relative;
      width: 340px;
      height: 220px;
      background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 100%);
      border-radius: 12px;
      box-shadow: 
        0 20px 60px rgba(0, 0, 0, 0.25),
        0 0 60px rgba(102, 126, 234, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.8);
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform-style: preserve-3d;
      perspective: 1200px;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .envelope:hover {
      transform: translateY(-8px);
      box-shadow: 
        0 30px 80px rgba(0, 0, 0, 0.35),
        0 0 80px rgba(102, 126, 234, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.8);
    }

    .envelope:active {
      transform: translateY(-4px);
    }

    /* Solapa (triángulo superior) */
    .flap {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
      clip-path: polygon(0 0, 50% 65%, 100% 0);
      border-radius: 12px 12px 0 0;
      transform-origin: top center;
      transition: transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 
        inset 0 -2px 8px rgba(0, 0, 0, 0.06),
        0 4px 15px rgba(0, 0, 0, 0.08);
      z-index: 5;
      pointer-events: none;
    }

    .flap::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.08) 0%, rgba(240, 147, 251, 0.08) 100%);
      clip-path: polygon(0 0, 50% 65%, 100% 0);
      border-radius: 12px 12px 0 0;
      opacity: 1;
    }

    /* Línea de "cierre" */
    .flap-line {
      position: absolute;
      top: 63%;
      left: 0;
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, #d0d0e0 25%, #d0d0e0 75%, transparent 100%);
      opacity: 0.5;
      z-index: 4;
      pointer-events: none;
    }

    /* Cuerpo del sobre */
    .envelope-body {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 35%;
      background: linear-gradient(180deg, #ffffff 0%, #f0f2f5 100%);
      border-radius: 0 0 12px 12px;
      box-shadow: inset 0 4px 12px rgba(0, 0, 0, 0.03);
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      border-top: 1px solid rgba(255, 255, 255, 0.5);
    }

    .envelope-body::before {
      content: '✨';
      font-size: 20px;
      letter-spacing: 16px;
      opacity: 0.4;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-3px);
      }
    }

    /* === TARJETA (dentro del sobre) === */
    .card {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 360px;
      max-height: 90vh;
      background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
      border-radius: 16px;
      box-shadow: 
        0 25px 80px rgba(0, 0, 0, 0.3),
        0 0 80px rgba(102, 126, 234, 0.25),
        inset 0 1px 0 rgba(255, 255, 255, 0.6);
      padding: 50px 30px;
      z-index: 100;
      transform: translate(-50%, -50%) scale(0.2) rotateX(100deg) rotateZ(-15deg);
      transform-origin: center;
      transition: transform 0.9s cubic-bezier(0.34, 1.56, 0.64, 1), 
                  opacity 0.6s ease, 
                  box-shadow 0.6s ease;
      opacity: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      pointer-events: none;
      border: 1px solid rgba(255, 255, 255, 0.4);
      overflow-y: auto;
      transform-style: preserve-3d;
      perspective: 1200px;
      backdrop-filter: blur(10px);
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at 20% 50%, rgba(102, 126, 234, 0.08) 0%, transparent 50%),
                  radial-gradient(circle at 80% 80%, rgba(240, 147, 251, 0.08) 0%, transparent 50%);
      border-radius: 16px;
      pointer-events: none;
      z-index: 0;
    }

    .card-content {
      max-width: 100%;
      position: relative;
      z-index: 1;
    }

    .card .emoji-big {
      font-size: 4.5rem;
      display: block;
      margin-bottom: 20px;
      animation: bounce 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
      transform-origin: center;
    }

    @keyframes bounce {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.15);
      }
    }

    .card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2.5rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
      font-weight: 700;
      letter-spacing: -0.8px;
      line-height: 1.2;
    }

    .card p {
      font-size: 1.1rem;
      color: #5a6c7d;
      line-height: 1.8;
      margin-top: 12px;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .card .firma {
      margin-top: 24px;
      font-style: italic;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-size: 1rem;
      font-weight: 600;
    }

    .confetti {
      position: fixed;
      pointer-events: none;
      z-index: 101;
    }

    /* === ESTADO ABIERTO === */
    .envelope.open .flap {
      transform: rotateX(-200deg);
    }

    .envelope.open .card {
      transform: translate(-50%, -50%) scale(1) rotateX(0deg) rotateZ(0deg);
      opacity: 1;
      pointer-events: auto;
      box-shadow: 
        0 40px 100px rgba(0, 0, 0, 0.4),
        0 0 100px rgba(102, 126, 234, 0.35);
    }

    /* Texto indicador */
    .hint {
      color: #ffffff;
      font-size: 1.05rem;
      background: rgba(255, 255, 255, 0.15);
      padding: 14px 28px;
      border-radius: 50px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      transition: all 0.4s ease;
      user-select: none;
      position: relative;
      z-index: 2;
      border: 1px solid rgba(255, 255, 255, 0.3);
      font-weight: 500;
      letter-spacing: 0.5px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-4px);
      }
    }

    .envelope.open ~ .hint {
      opacity: 0;
      pointer-events: none;
    }

    /* Botón para reiniciar */
    .reset-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      color: #ffffff;
      padding: 12px 32px;
      border-radius: 50px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
      margin-top: 8px;
      position: relative;
      z-index: 2;
      letter-spacing: 0.5px;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .reset-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 35px rgba(102, 126, 234, 0.5);
    }

    .reset-btn:active {
      transform: translateY(0);
      box-shadow: 0 6px 15px rgba(102, 126, 234, 0.4);
    }

    /* Ajustes para móvil */
    @media (max-width: 480px) {
      .envelope {
        width: 300px;
        height: 190px;
      }

      .card {
        width: 320px;
        max-height: 85vh;
        padding: 40px 24px;
      }

      .card h2 {
        font-size: 2rem;
      }

      .card .emoji-big {
        font-size: 3.5rem;
        margin-bottom: 16px;
      }

      .card p {
        font-size: 1rem;
      }

      .hint {
        font-size: 0.95rem;
        padding: 12px 24px;
      }

      .reset-btn {
        padding: 10px 28px;
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="envelope" id="envelope">
      <!-- Solapa -->
      <div class="flap"></div>
      <div class="flap-line"></div>

      <!-- Cuerpo del sobre -->
      <div class="envelope-body"></div>

      <!-- Tarjeta interior -->
      <div class="card" id="card">
        <div class="card-content">
          <span class="emoji-big">🎉</span>
          <h2>¡Felicidades Jesús!</h2>
        </div>
      </div>
    </div>

    <div class="hint" id="hint">👇 Abre el sobre para tu sorpresa</div>

    <button class="reset-btn" id="resetBtn">Cerrar sobre</button>
  </div>

  <script>
    // Generar confeti
    function createConfetti() {
      const confettiPieces = 50;
      const colors = ['#667eea', '#764ba2', '#f093fb', '#4facfe', '#00f2fe', '#ff6b6b', '#ffd93d'];
      
      for (let i = 0; i < confettiPieces; i++) {
        const confetti = document.createElement('div');
        confetti.className = 'confetti';
        confetti.style.left = Math.random() * 100 + '%';
        confetti.style.top = '-10px';
        confetti.style.width = Math.random() * 8 + 4 + 'px';
        confetti.style.height = confetti.style.width;
        confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.borderRadius = '50%';
        confetti.style.animation = `confettiFall ${Math.random() * 2 + 2}s linear forwards`;
        document.body.appendChild(confetti);

        setTimeout(() => confetti.remove(), 4000);
      }
    }

    const style = document.createElement('style');
    style.textContent = `
      @keyframes confettiFall {
        to {
          transform: translateY(100vh) rotateZ(360deg);
          opacity: 0;
        }
      }
    `;
    document.head.appendChild(style);

    (function() {
      const envelope = document.getElementById('envelope');
      const resetBtn = document.getElementById('resetBtn');
      const hint = document.getElementById('hint');

      // Abrir / cerrar con clic en el sobre
      envelope.addEventListener('click', function(e) {
        toggleEnvelope();
      });

      // Botón reset
      resetBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        if (envelope.classList.contains('open')) {
          envelope.classList.remove('open');
          hint.style.opacity = '1';
          hint.style.pointerEvents = 'auto';
        }
      });

      // Cerrar al hacer clic fuera
      document.addEventListener('click', function(e) {
        if (envelope.classList.contains('open') && 
            !envelope.contains(e.target) && 
            !resetBtn.contains(e.target) &&
            !e.target.closest('.card')) {
          envelope.classList.remove('open');
          hint.style.opacity = '1';
          hint.style.pointerEvents = 'auto';
        }
      });

      function toggleEnvelope() {
        const isOpen = envelope.classList.contains('open');
        if (isOpen) {
          envelope.classList.remove('open');
          hint.style.opacity = '1';
          hint.style.pointerEvents = 'auto';
        } else {
          envelope.classList.add('open');
          hint.style.opacity = '0';
          hint.style.pointerEvents = 'none';
          createConfetti();
        }
      }

      // Estado inicial
      window.addEventListener('load', function() {
        envelope.classList.remove('open');
        hint.style.opacity = '1';
        hint.style.pointerEvents = 'auto';
      });
    })();
  </script>

</body>
</html>
