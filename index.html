<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sobre de felicitación</title>
  <style>
    /* Reset y fondo */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(145deg, #f7e9d7 0%, #e8d5c4 100%);
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      padding: 16px;
      overflow-x: hidden;
      perspective: 1200px;
    }

    /* Contenedor principal */
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
      width: 100%;
      position: relative;
      z-index: 1;
      perspective: 1200px;
    }

    /* === SOBRE === */
    .envelope {
      position: relative;
      width: 320px;
      height: 200px;
      background: #fcf6ec;
      border-radius: 8px 8px 0 0;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2), 0 2px 8px rgba(0, 0, 0, 0.1);
      cursor: pointer;
      transition: transform 0.3s ease;
      transform-style: preserve-3d;
      perspective: 1000px;
    }

    .envelope:hover {
      transform: scale(1.02);
    }

    /* Solapa (triángulo superior) */
    .flap {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #fcf6ec;
      clip-path: polygon(0 0, 50% 60%, 100% 0);
      border-radius: 8px 8px 0 0;
      transform-origin: top center;
      transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: inset 0 -4px 8px rgba(0, 0, 0, 0.04);
      z-index: 5;
      pointer-events: none;
      /* borde simulado con pseudo */
    }

    .flap::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #faf2e6 0%, #f0e4d4 100%);
      clip-path: polygon(0 0, 50% 60%, 100% 0);
      border-radius: 8px 8px 0 0;
      opacity: 0.6;
    }

    /* Línea de "cierre" (simula el borde de la solapa) */
    .flap-line {
      position: absolute;
      top: 58%;
      left: 0;
      width: 100%;
      height: 2px;
      background: #dccfc0;
      opacity: 0.4;
      z-index: 4;
      pointer-events: none;
    }

    /* Cuerpo del sobre (parte inferior) */
    .envelope-body {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 42%;
      background: #fcf6ec;
      border-radius: 0 0 8px 8px;
      box-shadow: inset 0 4px 12px rgba(0, 0, 0, 0.04);
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Cinta decorativa (opcional) */
    .envelope-body::before {
      content: '✧';
      font-size: 24px;
      color: #c9b09b;
      letter-spacing: 12px;
      opacity: 0.5;
    }

    /* === TARJETA (dentro del sobre) === */
    .card {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 320px;
      max-height: 90vh;
      background: #ffffff;
      border-radius: 6px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
      padding: 30px 20px;
      z-index: 100;
      transform: translate(-50%, -50%) scale(0.3) rotateX(90deg) translateZ(-500px);
      transform-origin: center;
      transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.5s ease, box-shadow 0.5s ease;
      opacity: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      pointer-events: none;
      border: 1px solid #f0e8de;
      overflow-y: auto;
      transform-style: preserve-3d;
      perspective: 1000px;
    }

    .card-content {
      max-width: 100%;
    }

    .card h2 {
      font-size: 1.8rem;
      color: #3d2c1f;
      margin-bottom: 6px;
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    .card .emoji-big {
      font-size: 3.2rem;
      display: block;
      margin-bottom: 8px;
    }

    .card p {
      font-size: 1rem;
      color: #5a4a3a;
      line-height: 1.5;
      margin-top: 4px;
    }

    .card .firma {
      margin-top: 12px;
      font-style: italic;
      color: #a08472;
      font-size: 0.9rem;
    }

    /* === ESTADO ABIERTO === */
    .envelope.open .flap {
      transform: rotateX(-180deg);
    }

    .envelope.open .card {
      transform: translate(-50%, -50%) scale(1) rotateX(0deg) translateZ(0);
      opacity: 1;
      pointer-events: auto;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    }

    .envelope.open {
      transform: scale(1);
    }

    /* Texto indicador */
    .hint {
      color: #5a4a3a;
      font-size: 1rem;
      background: rgba(255, 255, 255, 0.5);
      padding: 8px 20px;
      border-radius: 40px;
      backdrop-filter: blur(4px);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
      transition: opacity 0.4s ease;
      user-select: none;
      position: relative;
      z-index: 2;
    }

    .envelope.open~.hint {
      opacity: 0;
      pointer-events: none;
    }

    /* Botón para reiniciar (opcional) */
    .reset-btn {
      background: #dccfc0;
      border: none;
      color: #3d2c1f;
      padding: 6px 18px;
      border-radius: 30px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
      margin-top: 4px;
      position: relative;
      z-index: 2;
    }

    .reset-btn:hover {
      background: #c9b9a8;
      transform: scale(1.03);
    }

    .reset-btn:active {
      transform: scale(0.96);
    }

    /* Ajustes para móvil */
    @media (max-width: 450px) {
      .envelope {
        width: 280px;
        height: 180px;
      }
      .card {
        width: 280px;
        max-height: 85vh;
        padding: 25px 15px;
      }
      .card h2 {
        font-size: 1.5rem;
      }
      .card .emoji-big {
        font-size: 2.6rem;
      }
      .card p {
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="envelope" id="envelope">
      <!-- Solapa -->
      <div class="flap"></div>
      <div class="flap-line"></div>

      <!-- Cuerpo del sobre (solo visual) -->
      <div class="envelope-body"></div>

      <!-- Tarjeta interior -->
      <div class="card" id="card">
        <div class="card-content">
          <span class="emoji-big">🎉</span>
          <h2>¡Felicidades Jesús!</h2>
        </div>
      </div>
    </div>

    <div class="hint" id="hint">👇 Haz clic en el sobre para abrirlo</div>

    <button class="reset-btn" id="resetBtn">Cerrar sobre</button>
  </div>

  <script>
    (function() {
      const envelope = document.getElementById('envelope');
      const resetBtn = document.getElementById('resetBtn');
      const hint = document.getElementById('hint');

      // Abrir / cerrar con clic en el sobre
      envelope.addEventListener('click', function(e) {
        toggleEnvelope();
      });

      // Botón reset (cierra)
      resetBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        if (envelope.classList.contains('open')) {
          envelope.classList.remove('open');
          hint.style.opacity = '1';
          hint.style.pointerEvents = 'auto';
        }
      });

      // Cerrar al hacer clic fuera de la tarjeta
      document.addEventListener('click', function(e) {
        if (envelope.classList.contains('open') && 
            !envelope.contains(e.target) && 
            !resetBtn.contains(e.target) &&
            !e.target.closest('.card')) {
          envelope.classList.remove('open');
          hint.style.opacity = '1';
          hint.style.pointerEvents = 'auto';
        }
      });

      function toggleEnvelope() {
        const isOpen = envelope.classList.contains('open');
        if (isOpen) {
          envelope.classList.remove('open');
          hint.style.opacity = '1';
          hint.style.pointerEvents = 'auto';
        } else {
          envelope.classList.add('open');
          hint.style.opacity = '0';
          hint.style.pointerEvents = 'none';
        }
      }

      // Al cargar, aseguramos estado inicial
      window.addEventListener('load', function() {
        envelope.classList.remove('open');
        hint.style.opacity = '1';
        hint.style.pointerEvents = 'auto';
      });
    })();
  </script>

</body>
</html>
